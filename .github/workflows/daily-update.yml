name: Daily Science Magazine Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: '指定主题 (可选)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate daily content
        env:
          AGENS_API_KEY: ${{ secrets.AGENS_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
          INPUT_THEME: ${{ github.event.inputs.theme }}
        run: |
          python scripts/generate.py --theme "$INPUT_THEME"

      - name: Build site pages
        run: |
          python scripts/page_builder.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
