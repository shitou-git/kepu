name: Daily Science Magazine Update

on:
  schedule:
    - cron: '0 8,16 * * *'
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'templates/**'
      - 'scripts/**'
      - 'config.json'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      theme:
        description: '指定主题 (可选)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate daily content
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          AGENS_API_KEY: ${{ secrets.AGENS_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
          INPUT_THEME: ${{ github.event.inputs.theme }}
          TZ: Asia/Shanghai
        run: |
          echo "当前时间: $(date)"
          echo "事件类型: ${{ github.event_name }}"
          echo "INPUT_THEME: $INPUT_THEME"
          python scripts/generate.py --theme "$INPUT_THEME"

      - name: Commit generated content
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          TZ: Asia/Shanghai
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add content/
          git commit -m "Auto-generate content for $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/shitou-git/kepu.git main

      - name: Build site pages
        run: |
          python scripts/page_builder.py

      - name: Commit version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add config.json
          git commit -m "chore: bump build version [skip ci]" || echo "No version changes"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/shitou-git/kepu.git main || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
