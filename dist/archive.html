<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>往期回顾 - 少年科普杂志</title>
    <meta name="description" content="专为小学生打造的每日科普杂志，涵盖航空航天、物理实验、榜样人物、自然动物等主题">
    <style>
        :root {
            --primary: #2c7a7b;
            --primary-light: #e6fffa;
            --accent: #ed8936;
            --bg: #f7fafc;
            --card: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #319795 100%);
            color: white;
            padding: 40px 0;
            text-align: center;
        }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { font-size: 1.1em; opacity: 0.9; }
        nav {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        nav .container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.3s;
        }
        nav a:hover, nav a.active { background: var(--primary-light); color: var(--primary); }
        main { padding: 40px 0; min-height: 500px; }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card h2 { color: var(--primary); margin-bottom: 16px; font-size: 1.5em; }
        .theme-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .article-list { display: grid; gap: 20px; }
        .article-item {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .article-item:hover { transform: translateY(-4px); }
        .article-item .cover {
            width: 100%;
            height: 100%;
            min-height: 150px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }
        .article-item .cover img { width: 100%; height: 100%; object-fit: cover; }
        .article-item .info { padding: 20px; }
        .article-item h3 { font-size: 1.3em; margin-bottom: 8px; }
        .article-item h3 a { color: var(--text); text-decoration: none; }
        .article-item h3 a:hover { color: var(--primary); }
        .article-item .meta { color: var(--text-light); font-size: 0.9em; margin-bottom: 10px; }
        .article-item .summary { color: var(--text-light); font-size: 0.95em; }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        footer {
            background: var(--text);
            color: white;
            text-align: center;
            padding: 30px 0;
            margin-top: 60px;
        }
        footer p { opacity: 0.8; font-size: 0.9em; }
        @media (max-width: 768px) {
            .article-item { grid-template-columns: 1fr; }
            .article-item .cover { min-height: 180px; }
            header h1 { font-size: 1.8em; }
        }
        
<style>
.archive-header { text-align: center; padding: 20px 0 40px; }
.archive-header h2 { font-size: 2em; color: var(--primary); }
.timeline { position: relative; padding-left: 30px; }
.timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
}
.month-group { margin-bottom: 40px; }
.month-label {
    position: relative;
    font-size: 1.3em;
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 20px;
    padding-left: 20px;
}
.month-label::before {
    content: '';
    position: absolute;
    left: -26px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    background: var(--primary);
    border-radius: 50%;
    border: 3px solid var(--card);
}
.month-articles { display: grid; gap: 16px; }
.archive-item {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card);
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
}
.archive-item:hover { border-color: var(--primary); transform: translateX(4px); }
.archive-item .date {
    min-width: 80px;
    text-align: center;
    color: var(--text-light);
    font-size: 0.9em;
}
.archive-item .date .day { font-size: 1.5em; font-weight: 600; color: var(--primary); }
.archive-item h4 { flex: 1; font-size: 1.1em; }
.archive-item .theme { font-size: 0.85em; }
.stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 40px;
}
.stat-item { text-align: center; }
.stat-item .number { font-size: 2.5em; font-weight: 700; color: var(--primary); }
.stat-item .label { color: var(--text-light); font-size: 0.9em; }
</style>

    </style>
</head>

    <footer>
